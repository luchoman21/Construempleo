<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Usuario</title>
<link rel="stylesheet" href="style.css">
<script src="./register.js"></script>
<body background="./img/fondo.jpg"></body>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>Regístrate en Nuestra Plataforma</h2>
    <p>Crea una cuenta para comenzar</p>
  </div>
  <h3>Registro de Usuario</h3>
  <form>
    <div class="form-group">
      <label for="firstname">Primer Nombre:</label>
      <input type="text" id="firstname" name="firstname">
    </div>
    <div class="form-group">
        <label for="secondname">Segundo Nombre:</label>
        <input type="text" id="secondname" name="secondname">
      </div>
      <div class="form-group">
        <label for="firstsurname">Primer Apellido:</label>
        <input type="text" id="firstsurname" name="firstsurname">
      </div>
      <div class="form-group">
        <label for="secondsurname">Segundo Apellido:</label>
        <input type="text" id="secondsurname" name="secondsurname">
      </div>
      <br>
      <form action="id">
        <label for="id">Tipo de identicación</label>
        <select name="id" id="id">
            <option value="Vacio"></option>
            <option value="Cedula">Cédula</option>
            <option value="Tarjeta de Identidad">Tarjeta de Identidad</option>
            <option value="Cedula Extranjeria">Cédula Extranjería</option>
            <option value="Permiso Especial Permanencia">Permiso Especial Permanencia</option>
            <option value="Pasaporte">Pasaporte</option>            
            </select>
            </form>
            <br>
            <div class="form-group">
              <label for="num_id">Número:</label>
              <input type="number" id="num_id" name="num_id">
            </div>            
      <div class="pass">
        <label for="pass">Contraseña:</label>
        <input type="password" id="pass" name="pass">
      </div>      
      <div class="pass2">
        <label for="pass2">Confirmar contraseña:</label>
        <input type="password" id="pass2" name="pass2">
      </div>
      <div class="mail">
        <label for="mail">E-mail:</label>
        <input type="email" id="mail" name="mail">
      </div>
      <br>
      <form action="perfil">
        <label for="perfil">Perfil</label>
        <select name="perfil" id="perfil">
            <option value="Vacio"></option>
            <option value="Albañil">Albañil</option>
            <option value="Arquitecto">Arquitecto</option>
            <option value="Capataz">Capataz</option>
            <option value="Carpintero">Carpintero</option>
            <option value="Electricista">Electricista</option>
            <option value="Estucador">Estucador</option>
            <option value="Ing. Civil">Ing. Civil</option>
            <option value="Jardinero">Jardinero</option>
            <option value="Ornamentador">Ornamentador</option>
            <option value="Pintor">Pintor</option>
            <option value="Plomero">Plomero</option>
            <option value="Topógrafo">Topógrafo</option>
            <option value="Vidriero">Vidriero</option>
            <br>
        </select>
    </form>      
      <br>     
   </form>
         <a href="./prerregister.html"><button type="submit">Siguiente</button></a>
         <p><a href="./index.html">Inicio</a></p>
  <h6>NOTA: El usuario es el número de identificación, en caso de ser NIT, no incluir el número de verificación</a></h6>
  <h6>©2023 2J&YL Team. Derechos reservados</a></h6>
</div>
</body>
</html>
